theme: "minimal-mistakes-jekyll"
minimal_mistakes_skin: "air"

locale: "tr-TR"
lang: tr
timezone: Europe/Istanbul

title: "ertodebana"
title_separator: "·"
subtitle: "Platform Engineering · DevOps · AI"
description: >-
  Platform engineering, DevOps, yapay zeka ve cloud-native pratikleri
  üzerine teknik yazılar ve rehberler.
url: "https://ertodebana.github.io"
baseurl: ""
repository: "ertodebana/ertodebana.github.io"

languages: ["tr", "en"]
default_lang: "tr"
parallel_localization: true
exclude_from_localization:
  - "assets"
  - "404.html"
  - "robots.txt"
  - "sitemap.xml"
  - "llms.txt"
  - "llms-full.txt"

logo:
masthead_title: "Yiğit Demiralp"
breadcrumbs: false
search: false
atom_feed:
  hide: true
words_per_minute: 220

github:
  username: ertodebana

social:
  type: Person
  name: Yiğit Demiralp
  links:
    - "https://github.com/ertodebana"
    - "https://linkedin.com/in/yigitdemiralp"

author:
  name: "Yiğit Demiralp"
  bio: "DevOps, platform engineering, AI ve cloud-native sistemler üzerine notlar."
  location: "Türkiye"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ertodebana"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/yigitdemiralp"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ertodebana"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/yigitdemiralp"
  since: "2026"

include:
  - _pages

exclude:
  - "*.gem"
  - "*.gemspec"
  - .bundle
  - .jekyll-cache
  - .jekyll-metadata
  - .sass-cache
  - vendor
  - docs
  - tools
  - README.md
  - LICENSE
  - package*.json
  - node_modules
  - _tabs

encoding: "utf-8"
markdown: kramdown
highlighter: rouge
permalink: pretty

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

sass:
  style: compressed
  sourcemap: never

plugins:
  - jekyll-include-cache
  - jekyll-polyglot

category_archive:
  type: liquid
  path: /kategoriler/

tag_archive:
  type: liquid
  path: /etiketler/

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      show_date: true
      share: false
      related: false
      comments: false
      toc: true
      classes: wide
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false
