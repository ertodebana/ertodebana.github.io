theme: jekyll-theme-chirpy

lang: tr

timezone: Europe/Istanbul

title: biseysoyle.me

tagline: "DevOps | Platform Engineering | AI | Cloud Native"

description: >-
  DevOps, Platform Engineering, Yapay Zeka ve Cloud Native teknolojileri
  hakkinda guncel yazilar, rehberler ve deneyimler.

url: "https://biseysoyle.me"

github:
  username: ertodebana

social:
  name: Ertodebana
  email: ""
  links:
    - https://github.com/ertodebana

theme_mode: # [light | dark]

# Self-hosted static assets, optional › https://github.com/cotes2020/chirpy-static-assets
assets:
  self_host:
    enabled: false

avatar: ""

toc: true

disqus:
  comments: false

google_analytics:
  id: ""

paginate: 10

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _tabs
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
